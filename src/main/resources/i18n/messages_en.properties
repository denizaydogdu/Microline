# --- About ---
meta.about.title=About Us — Microline
meta.about.desc=The Microline story: from a spark at a kitchen table to the kid-safe cardboard cutting machine.
about.hero.title=Why Microline?
about.hero.subtitle=It all started with a single sentence: "I wish my kid could cut this herself."
about.timeline.heading=Our story
about.timeline.1.year=2022
about.timeline.1.title=The spark: first workshop
about.timeline.1.body=A mountain of shipping boxes and little hands reaching for a craft knife... Our founder looked for a tool his daughter could use to cut her cardboard projects safely; when he could not find one, he turned the kitchen table into a workshop.
about.timeline.2.year=2023
about.timeline.2.title=Prototypes
about.timeline.2.body=The first prototype jammed on thick board, the second was far too slow. The fourteenth revision — moving the blade into a fully enclosed module — proved that fast and safe cutting were possible at the same time.
about.timeline.3.year=2024
about.timeline.3.title=Safety testing
about.timeline.3.body=Thousands of cutting tests, EN 71 toy-safety processes and pilot use in real classrooms... Only then did Microline become something we are proud to put in children's hands.
about.timeline.4.year=Today
about.timeline.4.title=Today and beyond
about.timeline.4.body=Today Microline turns cardboard into toys in homes, maker workshops and classrooms. Next up: new add-ons, new project kits and bigger dreams.
about.mission.heading=Our mission
about.mission.body=To give children tools they can cut with safely, instead of telling them "don't touch, you'll cut yourself." A child who builds with their own hands learns both to create and to not fear trying.
about.values.heading=Our values

# --- Educators ---
meta.educators.title=Educators — Microline
meta.educators.desc=Microline for classrooms and workshops: safe cutting tools, bulk pricing and educator support.
educators.hero.title=Safe Tools. Big Ideas.
educators.hero.subtitle=Microline was designed for classrooms where scissors fall short and craft knives are out of the question.
educators.learning.heading=How it supports learning
educators.learning.1.title=Fine motor skills
educators.learning.1.body=Cutting along a line trains hand-eye coordination and patience — without the child even noticing.
educators.learning.2.title=STEAM projects
educators.learning.2.body=Bridges, models, simple machines... Cardboard is the cheapest, most accessible engineering material there is.
educators.learning.3.title=Confidence and autonomy
educators.learning.3.body=A child who says "I cut it myself!" instead of "can you cut this for me?" owns both the project and the idea.
educators.pricing.heading=Bulk pricing
educators.pricing.note=Sample discount rates; contact us for a quote tailored to your school.
educators.pricing.col.qty=Quantity
educators.pricing.col.discount=Discount
