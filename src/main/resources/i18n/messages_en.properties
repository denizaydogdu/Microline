# --- Product safety ---
meta.safety.title=Product Safety — Microline
meta.safety.desc=Microline's safety promise: fully enclosed blade module, EN 71, CE and RoHS compliance, thousands of cutting tests.
safety.hero.title=Safety is not a feature; it is the design itself
safety.hero.body=The blade in a Microline is never exposed: cutting happens inside an enclosed module fingers cannot reach, and the machine stops automatically the moment it leaves the cardboard surface.
safety.certs.heading=Certifications and compliance
safety.cert.en71.title=EN 71-1 / -2 / -3
safety.cert.en71.issuer=European toy safety standard
safety.cert.en71.body=Mechanical and physical strength, flammability and material safety: tested against all three core parts that apply to children's products.
safety.cert.ce.title=CE + Declaration of Conformity
safety.cert.ce.issuer=European Union conformity marking
safety.cert.ce.body=The CE mark shows the product conforms to the applicable EU directives; we share the signed Declaration of Conformity with anyone who requests it.
safety.cert.rohs.title=RoHS
safety.cert.rohs.issuer=Restriction of hazardous substances directive
safety.cert.rohs.body=Restricts lead, mercury and similar harmful substances in electronic components — including every part your child touches.
safety.stats.heading=Safety in numbers
safety.stat.1.value=10,000+
safety.stat.1.label=cutting tests
safety.stat.2.value=14
safety.stat.2.label=prototype revisions
safety.stat.3.value=0
safety.stat.3.label=exposed blades
safety.stats.note=Values are sample indicators from our development process.
safety.cta.title=Request a test report
safety.cta.body=Write to us if you would like to review our Declaration of Conformity and test report summaries — we are happy to share them.
safety.cta.button=Request a Report

# --- Greener future ---
meta.sustainability.title=A Greener Future — Microline
meta.sustainability.desc=With Microline, waste cardboard becomes toys: one sapling per order and an endless recycling loop.
sustainability.hero.title=A Greener Future
sustainability.hero.subtitle=The most sustainable toy is the cardboard already in your home.
sustainability.pledge.heading=Our sapling pledge
sustainability.pledge.body=We plant one sapling for every Microline order.
sustainability.pledge.note=The sapling programme is in its pilot phase; we will announce our certification partner soon.
sustainability.how.heading=How it works
sustainability.how.1.title=Keep the box
sustainability.how.1.body=Shipping boxes, shoe boxes, cartons... Take one more look before calling it "waste".
sustainability.how.2.title=Cut and create
sustainability.how.2.body=With Microline, cardboard becomes a toy, a model, a stage set.
sustainability.how.3.title=Recycle
sustainability.how.3.body=When a project reaches the end of its life, the cardboard goes back into the paper bank. The loop closes.
sustainability.circular.heading=Cardboard: nature's maker material
sustainability.circular.body1=Cardboard is one of the most widely recycled packaging materials in the world; the same fibre can become paper again many times without losing quality.
sustainability.circular.body2=That is why Microline projects favour slot joints over glue: when playtime is over, the pieces come apart and the cardboard returns to the loop clean.
sustainability.cta.title=Start today with the cardboard in your home
sustainability.cta.button=Explore the Shop

