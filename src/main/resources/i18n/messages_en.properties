educators.testimonial.body=Three Microlines run at the same time in a class of twenty-four; in two terms we have not had a single safety concern. Our end-of-term model exhibition is now built entirely by the kids.
educators.testimonial.author=Ayşe K.
educators.testimonial.role=Primary School Teacher, Istanbul
