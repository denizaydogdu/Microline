# --- Hakkımızda ---
meta.about.title=Hakkımızda — Microline
meta.about.desc=Microline'ın hikayesi: bir mutfak masasındaki kıvılcımdan çocuk güvenli karton kesim makinesine uzanan yolculuk.
about.hero.title=Neden Microline?
about.hero.subtitle=Her şey tek bir cümleyle başladı: "Keşke çocuğum bunu kendisi kesebilse."
about.timeline.heading=Hikayemiz
about.timeline.1.year=2022
about.timeline.1.title=Kıvılcım: ilk atölye
about.timeline.1.body=Bir kargo kutusu dağı ve maketçi bıçağına uzanan küçük eller... Kurucumuz, kızının karton projelerini güvenle kesebileceği bir araç aradı; bulamayınca mutfak masasını atölyeye çevirdi.
about.timeline.2.year=2023
about.timeline.2.title=Prototipler
about.timeline.2.body=İlk prototip kalın mukavvada tıkandı, ikincisi çok yavaştı. On dördüncü revizyonda bıçağı tamamen kapalı bir modüle taşıyan tasarım, hızlı ve güvenli kesimin aynı anda mümkün olduğunu kanıtladı.
about.timeline.3.year=2024
about.timeline.3.title=Güvenlik testleri
about.timeline.3.body=Binlerce kesim testi, EN 71 oyuncak güvenliği süreçleri ve sınıflarda pilot kullanımlar... Microline, çocukların eline gönül rahatlığıyla vereceğimiz hale ancak böyle geldi.
about.timeline.4.year=Bugün
about.timeline.4.title=Bugün ve sonrası
about.timeline.4.body=Bugün Microline; evlerde, maker atölyelerinde ve sınıflarda kartonu oyuncağa dönüştürüyor. Sırada yeni eklentiler, yeni proje kitleri ve daha büyük hayaller var.
about.mission.heading=Misyonumuz
about.mission.body=Çocuklara "dokunma, kesersin" demek yerine güvenle kesebilecekleri araçlar vermek. Çünkü kendi elleriyle yapan çocuk, hem üretmeyi hem de denemekten korkmamayı öğrenir.
about.values.heading=Değerlerimiz

