# --- Ürün güvenliği ---
meta.safety.title=Ürün Güvenliği — Microline
meta.safety.desc=Microline'ın güvenlik sözü: tamamen kapalı bıçak modülü, EN 71, CE ve RoHS uygunluğu, binlerce kesim testi.
safety.hero.title=Güvenlik bir özellik değil; tasarımın kendisi
safety.hero.body=Microline'da bıçak hiçbir zaman açıkta değildir: kesim, parmakların giremeyeceği kapalı bir modülün içinde gerçekleşir ve makine karton yüzeyinden kalkar kalkmaz otomatik durur.
safety.certs.heading=Sertifikalar ve uygunluk
safety.cert.en71.title=EN 71-1 / -2 / -3
safety.cert.en71.issuer=Avrupa oyuncak güvenliği standardı
safety.cert.en71.body=Mekanik ve fiziksel dayanım, alev almazlık ve malzeme güvenliği: çocuk ürünleri için üç temel bölümü de kapsayan testlerden geçer.
safety.cert.ce.title=CE + Uygunluk Beyanı
safety.cert.ce.issuer=Avrupa Birliği uygunluk işareti
safety.cert.ce.body=CE işareti, ürünün ilgili AB direktiflerine uygunluğunu gösterir; imzalı Uygunluk Beyanı'nı talep eden herkesle paylaşıyoruz.
safety.cert.rohs.title=RoHS
safety.cert.rohs.issuer=Tehlikeli madde kısıtlaması direktifi
safety.cert.rohs.body=Elektronik bileşenlerde kurşun, cıva ve benzeri zararlı maddelerin kullanımını kısıtlar — çocuğunuzun dokunduğu her parça dahil.
safety.stats.heading=Rakamlarla güvenlik
safety.stat.1.value=10.000+
safety.stat.1.label=kesim testi
safety.stat.2.value=14
safety.stat.2.label=prototip revizyonu
safety.stat.3.value=0
safety.stat.3.label=açıkta bıçak
safety.stats.note=Değerler geliştirme sürecimizden örnek göstergelerdir.
safety.cta.title=Test raporu talep edin
safety.cta.body=Uygunluk beyanımızı ve test raporu özetlerini incelemek isterseniz bize yazın; memnuniyetle paylaşalım.
safety.cta.button=Rapor Talep Et

# --- Yeşil gelecek ---
meta.sustainability.title=Daha Yeşil Bir Gelecek — Microline
meta.sustainability.desc=Microline ile atık karton oyuncağa dönüşür: her sipariş için bir fidan, sonsuz geri dönüşüm döngüsü.
sustainability.hero.title=Daha Yeşil Bir Gelecek
sustainability.hero.subtitle=En sürdürülebilir oyuncak, zaten evinizde olan kartondur.
sustainability.pledge.heading=Fidan sözümüz
sustainability.pledge.body=Her Microline siparişi için bir fidan dikiyoruz.
sustainability.pledge.note=Fidan programı pilot aşamadadır; sertifikasyon ortağımızı yakında duyuracağız.
sustainability.how.heading=Nasıl çalışır?
sustainability.how.1.title=Kutuyu saklayın
sustainability.how.1.body=Kargo kutusu, ayakkabı kutusu, koli... "Atık" demeden önce bir kez daha bakın.
sustainability.how.2.title=Kesin ve yaratın
sustainability.how.2.body=Microline ile karton; oyuncağa, makete, sahne dekoruna dönüşür.
sustainability.how.3.title=Geri dönüştürün
sustainability.how.3.body=Projenin ömrü bittiğinde karton, kağıt kumbarasına geri döner. Döngü tamamlanır.
sustainability.circular.heading=Karton: doğanın maker malzemesi
sustainability.circular.body1=Karton, dünyada en yüksek oranda geri dönüştürülen ambalaj malzemelerinden biridir; aynı lif, kalitesi düşmeden defalarca yeniden kağıda dönüşebilir.
sustainability.circular.body2=Bu yüzden Microline projeleri yapıştırıcı yerine geçmeli birleşimleri teşvik eder: oyun bittiğinde parçalar ayrılır ve karton, döngüye temiz biçimde geri döner.
sustainability.cta.title=Bugün evinizdeki kartonla başlayın
sustainability.cta.button=Mağazayı Keşfet

