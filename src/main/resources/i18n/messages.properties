educators.learning.heading=Öğrenmeyi nasıl destekler?
educators.learning.1.title=İnce motor becerileri
educators.learning.1.body=Çizgiyi takip ederek kesmek; el-göz koordinasyonunu ve sabrı, çocuk farkına bile varmadan çalıştırır.
educators.learning.2.title=STEAM projeleri
educators.learning.2.body=Köprüler, maketler, basit makineler... Karton, en ucuz ve en erişilebilir mühendislik malzemesidir.
educators.learning.3.title=Özgüven ve özerklik
educators.learning.3.body="Benim için keser misin?" yerine "Kendim kestim!" diyen çocuk, projeyi de fikri de sahiplenir.
