<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout-dialect"
      layout:decorate="~{admin/layout/admin-base}" lang="tr">
<head>
    <title th:text="#{admin.password.title} + ' — ' + #{admin.title}">Şifre Değiştir — Microline Yönetim</title>
</head>
<body>
<div layout:fragment="content">
    <h1 class="admin-page-title" th:text="#{admin.password.heading}">Şifre Değiştir</h1>

    <div class="admin-form-card">
        <div class="form-banner form-banner-success" role="status" th:if="${flashSuccess}">
            <p th:text="#{admin.password.success}">Şifreniz güncellendi.</p>
        </div>

        <form class="form" method="post" th:action="@{/admin/sifre}" th:object="${passwordChangeForm}">
            <div class="form-field">
                <label for="pw-current" th:text="#{admin.password.current}">Mevcut şifre</label>
                <input type="password" id="pw-current" th:field="*{currentPassword}" required
                       autocomplete="current-password"
                       th:classappend="${#fields.hasErrors('currentPassword')} ? 'field-error-input'">
                <p class="field-error" th:if="${#fields.hasErrors('currentPassword')}"
                   th:errors="*{currentPassword}">Hata</p>
            </div>
            <div class="form-field">
                <label for="pw-new" th:text="#{admin.password.new}">Yeni şifre</label>
                <input type="password" id="pw-new" th:field="*{newPassword}" required minlength="10"
                       autocomplete="new-password"
                       th:classappend="${#fields.hasErrors('newPassword')} ? 'field-error-input'">
                <p class="field-error" th:if="${#fields.hasErrors('newPassword')}"
                   th:errors="*{newPassword}">Hata</p>
            </div>
            <div class="form-field">
                <label for="pw-confirm" th:text="#{admin.password.confirm}">Yeni şifre (tekrar)</label>
                <input type="password" id="pw-confirm" th:field="*{newPasswordConfirm}" required
                       autocomplete="new-password"
                       th:classappend="${#fields.hasErrors('newPasswordConfirm')} ? 'field-error-input'">
                <p class="field-error" th:if="${#fields.hasErrors('newPasswordConfirm')}"
                   th:errors="*{newPasswordConfirm}">Hata</p>
            </div>
            <button class="btn btn-primary" type="submit" th:text="#{admin.password.submit}">Şifreyi Güncelle</button>
        </form>
    </div>
</div>
</body>
</html>
