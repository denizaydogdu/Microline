<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<body>
<!--/* Dil değiştirici öncelik sırası: dinamik sayfaların model'e koyduğu açık
       alternateUrl → statik sayfaların route'u → (hata sayfaları) diğer dilin ana sayfası */-->
<header class="site-header" th:fragment="header"
        th:with="headerAltUrl=${alternateUrl != null ? alternateUrl : (route != null ? @localeUrls.alternate(route, #locale) : (currentLang == 'en' ? '/tr/' : '/en/'))}">
    <div class="container header-inner">
        <a class="logo" th:href="${currentLang == 'en'} ? '/en/' : '/tr/'">
            <img class="logo-img" th:src="@{/img/brand/logo-header.png}" th:alt="#{site.name}" alt="Microline"
                 width="114" height="40">
        </a>

        <button class="menu-toggle" type="button" data-menu-toggle
                aria-expanded="false" aria-controls="site-nav">
            <span class="visually-hidden" th:text="#{nav.menu}">Menü</span>
            <span class="menu-toggle-bars" aria-hidden="true"><span></span><span></span><span></span></span>
        </button>

        <nav id="site-nav" class="site-nav" th:aria-label="#{nav.menu}">
            <ul class="nav-list">
                <li class="nav-item has-dropdown">
                    <button class="nav-link dropdown-toggle" type="button" data-dropdown-toggle
                            aria-expanded="false" aria-controls="shop-menu">
                        <span th:text="#{nav.shop}">Mağaza</span>
                        <span class="dropdown-caret" aria-hidden="true">▾</span>
                    </button>
                    <!--/* GlobalModelAdvice'tan gelen aktif koleksiyonlar (DB), sort_order sırasıyla */-->
                    <ul id="shop-menu" class="dropdown" hidden>
                        <li th:each="c : ${navCollections}">
                            <a class="dropdown-link"
                               th:href="${@localeUrls.collectionPath(c, #locale)}"
                               th:text="${c.getName(#locale)}">Kesim Araçları</a>
                        </li>
                    </ul>
                </li>
                <li class="nav-item"><a class="nav-link" th:href="${routes['REVIEWS'].path(#locale)}"
                                        th:text="#{nav.reviews}">Yorumlar</a></li>
                <li class="nav-item"><a class="nav-link" th:href="${routes['TUTORIALS'].path(#locale)}"
                                        th:text="#{nav.tutorials}">Eğitimler</a></li>
                <li class="nav-item"><a class="nav-link" th:href="${routes['EDUCATORS'].path(#locale)}"
                                        th:text="#{nav.educators}">Eğitimciler</a></li>
                <li class="nav-item"><a class="nav-link" th:href="${routes['ABOUT'].path(#locale)}"
                                        th:text="#{nav.about}">Hakkımızda</a></li>
                <li class="nav-item nav-item-lang">
                    <a class="lang-switch" th:href="${headerAltUrl}" th:aria-label="#{lang.switch}"
                       th:hreflang="${currentLang == 'tr'} ? 'en' : 'tr'"
                       th:text="${currentLang == 'tr'} ? 'EN' : 'TR'">EN</a>
                </li>
            </ul>
        </nav>

        <!--/* Sepet: nav DIŞINDA — mobilde drawer'a girmez, her zaman görünür.
               Sayı rozeti dekoratif (aria-hidden); bilgiyi aria-label taşır */-->
        <a class="cart-link" th:href="${routes['CART'].path(#locale)}"
           th:aria-label="#{cart.link.label(${cartCount})}">
            <svg class="cart-icon" aria-hidden="true" viewBox="0 0 24 24" width="24" height="24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-badge" th:if="${cartCount > 0}" aria-hidden="true"
                  th:text="${cartCount}">2</span>
        </a>
    </div>
</header>
</body>
</html>
