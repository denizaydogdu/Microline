spring:
  application:
    name: microline-web
  datasource:
    url: jdbc:postgresql://localhost:5432/microline
    username: microline
    password: microline
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  thymeleaf:
    cache: true
  servlet:
    multipart:
      # ImageStorageService 5MB'ı ayrıca doğrular; request limiti çoklu
      # alan + CSRF token payı için daha geniş tutulur.
      max-file-size: 5MB
      max-request-size: 12MB

server:
  port: 8080
  # "framework" yalnızca güvenilir reverse proxy arkasında açılmalı: doğrudan
  # internete açıkken X-Forwarded-For ile IP throttle taklit edilebilir.
  # Proxy'li üretimde SPRING_APPLICATION_JSON veya profil ile "framework" yapın.
  forward-headers-strategy: none

management:
  endpoints:
    web:
      exposure:
        include: health

microline:
  base-url: https://www.microline.com.tr
  # Dev varsayılanı: proje kökünde ./uploads (gitignore'lu). Prod profili
  # /var/microline/uploads kullanır, test profili target/test-uploads.
  uploads-dir: ./uploads
  admin:
    # Yalnızca İLK açılışta admin_users tablosu boşken kullanılır.
    # Şifreyi yml'e YAZMAYIN — MICROLINE_ADMIN_INITIAL_PASSWORD env değişkeniyle
    # verin; boş bırakılırsa rastgele üretilir ve açılışta WARN loglanır.
    initial-username: admin
    initial-password: ""
